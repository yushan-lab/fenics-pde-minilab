name: Reproduce DOLFINx results

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  reproduce:
    name: Run numerical reproduction
    runs-on: ubuntu-latest
    container:
      image: dolfinx/dolfinx:stable

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show DOLFINx version
        run: python3 -c "import dolfinx; print(dolfinx.__version__)"

      - name: Install package
        run: python3 -m pip install -e ".[dev]"

      - name: Run tests
        run: python3 -m pytest -q

      - name: Clean previous generated outputs
        run: python3 scripts/clean_results.py

      - name: Reproduce numerical results
        run: python3 scripts/reproduce_all.py

      - name: Check generated outputs
        run: python3 scripts/check_outputs.py

      - name: Upload generated results
        uses: actions/upload-artifact@v4
        with:
          name: fenics-generated-results
          path: |
            results/
            figures/
          if-no-files-found: error
